<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Color Detection — Vision AI</title>
<link rel="icon" href="/static/images/favicon.ico"/>
<link rel="stylesheet" href="/static/detection.css"/>
<style>
  .dp-nav-badge { background: rgba(34,197,94,.15); color: #22c55e; }
  .active-color-preview {
    width: 100%; height: 38px; border-radius: var(--rsm);
    border: 2px solid var(--border);
    transition: background .3s;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; color: rgba(0,0,0,.6);
    margin-bottom: 18px;
  }
</style>
</head>
<body>

<!-- Nav -->
<nav class="dp-nav">
  <a href="/" class="dp-back">← Back</a>
  <div class="dp-nav-title">
    🎨 <span>Color Detection</span>
    <span class="dp-nav-badge">Live</span>
  </div>
  <span class="dp-spacer"></span>
  <div class="dp-status" id="status-pill">
    <span class="dp-dot" id="status-dot"></span>
    <span id="status-txt">Starting…</span>
  </div>
</nav>

<div class="dp-layout">

  <!-- Sidebar -->
  <aside class="dp-sidebar">
    <div class="dp-sidebar-title">Tracking Colour</div>

    <!-- Live preview swatch -->
    <div class="active-color-preview" id="color-preview">Green</div>

    <div class="ctrl-label">Pick a Colour</div>
    <div class="swatch-grid" id="swatch-grid"></div>

    <div style="margin-top: 32px;">
      <div class="ctrl-label">How it works</div>
      <div class="info-box">
        The camera feed is converted to <strong>HSV colour space</strong>.
        A mask isolates pixels matching the chosen hue, then a bounding box
        wraps the largest matching region.
      </div>
    </div>
  </aside>

  <!-- Stream -->
  <section class="dp-main">
    <div class="dp-toolbar">
      <span class="dp-toolbar-title">Tracking: <span id="tracking-lbl">Green</span></span>
      <button class="snap-btn" onclick="takeSnapshot()">📷 Snapshot</button>
    </div>

    <div class="dp-canvas">
      <img id="feed" src="/stream/color" alt="Color Detection Stream"/>
    </div>

    <div class="dp-infobar">
      <div class="dp-chip ok" id="chip-cam">
        <span class="dp-chip-dot"></span> Camera
      </div>
      <div class="dp-chip ok">
        <span class="dp-chip-dot"></span> HSV Masking
      </div>
      <div class="dp-chip ok">
        <span class="dp-chip-dot"></span> Bounding Box
      </div>
    </div>
  </section>

</div>

<div id="toast"></div>
<canvas id="snap-canvas"></canvas>

<script>
const COLOUR_HEX = {
  Green:'#22c55e', Red:'#ef4444', Blue:'#3b82f6',
  Yellow:'#eab308', Orange:'#f97316', Purple:'#a855f7',
  Cyan:'#06b6d4', White:'#f1f5f9'
};

let selected = 'Green';

async function init() {
  const res  = await fetch('/api/colours');
  const cols = await res.json();  // {name: hex}
  const grid = document.getElementById('swatch-grid');
  Object.entries(cols).forEach(([name, hex]) => {
    const s = document.createElement('div');
    s.className = 'swatch' + (name === selected ? ' selected' : '');
    s.style.background = hex;
    s.title = name;
    s.innerHTML = `<span class="swatch-tip">${name}</span>`;
    s.onclick = () => pickColour(name, hex);
    grid.appendChild(s);
  });
  setStatus('live', 'Live');
  refreshPreview('Green', COLOUR_HEX['Green']);
}

async function pickColour(name, hex) {
  selected = name;
  document.querySelectorAll('.swatch').forEach(s =>
    s.classList.toggle('selected', s.title === name));
  refreshPreview(name, hex);
  document.getElementById('tracking-lbl').textContent = name;
  await fetch('/api/color', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({name})
  });
  toast(`Now tracking: ${name}`);
}

function refreshPreview(name, hex) {
  const p = document.getElementById('color-preview');
  p.style.background = hex;
  p.textContent = name;
  // Adjust text color for light backgrounds
  const isLight = ['Yellow','White','Cyan'].includes(name);
  p.style.color = isLight ? 'rgba(0,0,0,.7)' : 'rgba(255,255,255,.85)';
}

function setStatus(state, label) {
  document.getElementById('status-dot').className = 'dp-dot ' + (state === 'live' ? 'live' : '');
  document.getElementById('status-txt').textContent = label;
}

function takeSnapshot() {
  const img = document.getElementById('feed');
  const c   = document.getElementById('snap-canvas');
  c.width = img.naturalWidth || img.clientWidth;
  c.height = img.naturalHeight || img.clientHeight;
  c.getContext('2d').drawImage(img, 0, 0);
  const a = document.createElement('a');
  a.download = `color_${Date.now()}.jpg`;
  a.href = c.toDataURL('image/jpeg', .92);
  a.click();
  toast('Snapshot saved ✓');
}

let toastT;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => el.classList.remove('show'), 2600);
}

init();
</script>
</body>
</html>
